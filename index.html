<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- UTmify Script -->
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-xcod-sck
      data-utmify-prevent-subids
    ></script>
    <!-- Pixel Script -->
    <script>
      window.pixelId = "69b49060fe94245ed97b7d52";
      var a = document.createElement("script");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);

      // Global listener for checkout clicks to prevent blocking
      document.addEventListener('click', function(e) {
        var target = e.target.closest('[data-utmify-checkout]');
        if (target && window.pixel) {
          try {
            window.pixel.track("InitiateCheckout");
          } catch (err) {
            console.warn("Tracking failed but proceeding...");
          }
        }
      }, true);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lancheira Saudável</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
